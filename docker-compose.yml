services:
  cassandra:
    image: cassandra:4.1
    container_name: zoomarket-cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=ZoomarketCluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zoomarket-redis
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: zoomarket-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: zoomarket-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - S3_BUCKET=${S3_BUCKET:-zoomarket-media}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
        mc mb -p local/$$S3_BUCKET || true &&
        mc anonymous set download local/$$S3_BUCKET &&
        echo 'MinIO bucket ready'
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zoomarket-backend
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: zoomarket-frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: zoomarket-nginx
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/init-ssl.sh:/docker-entrypoint.d/40-init-ssl.sh:ro
      - letsencrypt:/etc/letsencrypt   # volume holds SSL certs (any provider, name kept for compat)
    depends_on:
      - backend
      - frontend
      - minio
    restart: unless-stopped

volumes:
  cassandra_data:
  minio_data:
  letsencrypt:
